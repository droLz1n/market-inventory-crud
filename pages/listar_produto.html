<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="/styles/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="/images/super-favicon.png">
</head>
<body>
    <div id="menu-container"></div>

    <main class="conteudo-principal">
        <section class="pagina pagina">
            <div class="cabecalho-cadastro card-gradiente-hero">
                <span class="cabecalho-cadastro__tag">
                    <i class="bi bi-list-columns-reverse"></i>
                    Visão geral do estoque
                </span>
                <h1>Produtos em Estoque</h1>
            </div>

            <section class="painel painel-estoque">
                <div class="painel__topo painel-estoque__topo">
                    <div>
                        <h2 class="titulo-secao-estoque">Lista de Produtos</h2>
                    </div>

                    <div class="resumo-estoque">
                        <div class="resumo-card card-gradiente">
                            <span class="resumo-card__rotulo card-label">Produtos</span>
                            <strong id="total-produtos">0</strong>
                        </div>
                        <div class="resumo-card card-gradiente">
                            <span class="resumo-card__rotulo card-label">Atualização</span>
                            <strong>Em breve</strong>
                        </div>
                    </div>
                </div>

                <div class="tabela-estoque__wrapper">
                    <table class="tabela-estoque">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Produto</th>
                                <th>Tipo</th>
                                <th>Quantidade</th>
                                <th>Preço</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="lista-produtos"></tbody>
                    </table>
                </div>

                <div class="estado-vazio" id="estado-vazio">
                    <div class="estado-vazio__icone icone-box">
                        <i class="bi bi-inboxes"></i>
                    </div>
                    <h3>Nenhum produto carregado</h3>
                    <p>Assim que você conectar esta página ao PostgreSQL, os produtos cadastrados serão exibidos aqui.</p>
                </div>
            </section>
        </section>
    </main>

    <script src="/menu/menu.js"></script>
    <script src="/script.js"></script>
</body>
</html>
