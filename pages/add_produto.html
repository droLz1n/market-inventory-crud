<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Produto</title>
    <link rel="stylesheet" href="/styles/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="/images/super-favicon.png">
</head>
<body>
    <div id="menu-container"></div>
    <main class="conteudo-principal">
        <div>
            <h1>Cadastro de Produtos</h1>
            <br>
        </div>

        <form>
            <fieldset>
                <div>
                    <label>Nome do Produto</label>
                    <input type="text" nome="nome_do_produto"  id="nome_do_produto" placeholder="Nome do produto" required>
                </div>

                <div>
                    <label>Quantidade</label>
                    <input type="number" nome="quantidade" id="quantidade" placeholder="Quantidade" required>
                </div>

                <div>
                    <label>Tipo</label>
                    <select id="unidade" name="unidade" required>
                    <option value="und">Unidade</option>
                    <option value="kg">Kg</option>
                    </select>
                </div>

                <div>
                    <label>Preço do produto</label>
                    <input type="number" name="preco" id="preco" step="0.01" min="0" placeholder="0,00" required>
                </div>
                
                <div>
                    <button type="submit">Cadastrar Produto</button>
                </div>
            </fieldset>
        </form>
    </main>


    <script src="/menu/menu.js"></script>
    <script>
        fetch('/menu/menu.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('menu-container').innerHTML = data;
            inicializarMenu();
        })
        .catch(error => console.error('Erro ao carregar o menu:', error));
    </script>
</body>
</html>
