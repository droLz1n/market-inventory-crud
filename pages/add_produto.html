<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Produto</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="/images/super-favicon.png">
</head>
<body>
    <div id="menu-container"></div>

    <main class="conteudo-principal conteudo-principal--topo">
        <section class="pagina pagina">
            <div class="cabecalho-cadastro card-gradiente-hero">
                <span class="cabecalho-cadastro__tag">
                    <i class="bi bi-box-seam"></i>
                    Adicionar Item
                </span>
                <h1>Cadastro de Produtos</h1>
                <p>Preencha os campos abaixo para adicionar um novo produto ao seu controle de estoque.</p>
            </div>

            <form class="painel form-cadastro-produto">
                <fieldset>
                    <div class="grade-formulario empilha-md">
                        <div class="campo-formulario campo-coluna campo-coluna--8 campo-formulario--grande span-1-md">
                            <label for="nome_do_produto">Nome do Produto</label>
                            <input type="text" name="nome_do_produto" id="nome_do_produto" placeholder="Ex.: Arroz Integral" required>
                        </div>

                        <div class="campo-formulario campo-coluna campo-coluna--8">
                            <label for="quantidade">Quantidade</label>
                            <input type="number" name="quantidade" id="quantidade" placeholder="0" min="0" required>
                        </div>

                        <div class="campo-formulario campo-coluna campo-coluna--8">
                            <label for="unidade">Tipo</label>
                            <select id="unidade" name="unidade" required>
                                <option value="" disabled selected>Selecione a unidade</option>
                                <option value="und">Unidade</option>
                                <option value="kg">Kg</option>
                            </select>
                        </div>

                        <div class="campo-formulario campo-coluna campo-coluna--8 campo-formulario--grande span-1-md">
                            <label for="preco">Preço do Produto</label>
                            <input type="number" name="preco" id="preco" step="0.01" min="0" placeholder="0.00" required>
                        </div>
                    </div>

                    <div class="rodape-formulario">
                        <p class="rodape-formulario__texto">Revise os dados antes de salvar para manter o estoque sempre organizado.</p>
                        <button type="submit" class="botao-principal">
                            <i class="bi bi-plus-circle"></i>
                            Cadastrar Produto
                        </button>
                    </div>
                </fieldset>
            </form>
        </section>
    </main>

    <script src="/menu/menu.js"></script>
    <script src="/script.js"></script>
</body>
</html>
